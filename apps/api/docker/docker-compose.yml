version: '3.8'

services:
  postgres-db:
    image: postgis/postgis:15-3.3
    container_name: cra-postgres-postgis
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: cra_password
      POSTGRES_DB: cra_recife_ambiental
    ports:
      - "5432:5432"
    volumes:
      - cra_postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  cra_postgres_data: