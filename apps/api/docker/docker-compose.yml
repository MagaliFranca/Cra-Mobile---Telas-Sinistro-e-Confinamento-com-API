version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: cra_postgres
    environment:
      POSTGRES_USER: cra_user
      POSTGRES_PASSWORD: cra_pass
      POSTGRES_DB: cra_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: